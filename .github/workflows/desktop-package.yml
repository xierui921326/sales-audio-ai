name: Desktop Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            make_target: desktop-build-windows
            rust_target: x86_64-pc-windows-msvc
            artifact_path: desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*
          - name: macos-intel
            os: macos-latest
            make_target: desktop-build-macos-intel
            rust_target: x86_64-apple-darwin
            artifact_path: desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/**/*
          - name: macos-arm
            os: macos-latest
            make_target: desktop-build-macos-arm
            rust_target: aarch64-apple-darwin
            artifact_path: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: make ${{ matrix.make_target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sales-audio-ai-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect release files
        id: collect_files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f)

          if [ "${#files[@]}" -eq 0 ]; then
            echo '未找到可发布的构建产物' >&2
            exit 1
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.collect_files.outputs.files }}
          generate_release_notes: true
