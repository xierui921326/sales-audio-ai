name: Desktop Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            make_target: desktop-build-windows
            rust_target: x86_64-pc-windows-msvc
            bundle_dir: desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle
            release_glob: |
              desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - name: macos-intel
            os: macos-latest
            make_target: desktop-build-macos-intel
            rust_target: x86_64-apple-darwin
            bundle_dir: desktop/src-tauri/target/x86_64-apple-darwin/release/bundle
            release_glob: |
              desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - name: macos-arm
            os: macos-latest
            make_target: desktop-build-macos-arm
            rust_target: aarch64-apple-darwin
            bundle_dir: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle
            release_glob: |
              desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz

    runs-on: ${{ matrix.os }}
    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Validate Apple certificate secret before macOS build
        if: startsWith(matrix.name, 'macos')
        id: apple_certificate_check
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          set -euo pipefail

          echo 'use_certificate=false' >> "$GITHUB_OUTPUT"

          if [ -z "${APPLE_CERTIFICATE}" ]; then
            echo '未配置 APPLE_CERTIFICATE，将使用 ad-hoc 签名构建 macOS 包'
            exit 0
          fi

          if [ -z "${APPLE_CERTIFICATE_PASSWORD}" ]; then
            echo '已配置 APPLE_CERTIFICATE，但缺少 APPLE_CERTIFICATE_PASSWORD，将回退到 ad-hoc 签名' >&2
            exit 0
          fi

          cert_path="$RUNNER_TEMP/apple-signing-cert.p12"
          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path" 2>/dev/null; then
            echo 'APPLE_CERTIFICATE 不是有效 base64，将回退到 ad-hoc 签名' >&2
            exit 0
          fi

          if [ ! -s "$cert_path" ]; then
            echo 'APPLE_CERTIFICATE 无法解码为有效的 p12 文件，将回退到 ad-hoc 签名' >&2
            exit 0
          fi

          if ! openssl pkcs12 -in "$cert_path" -nokeys -passin "pass:${APPLE_CERTIFICATE_PASSWORD}" >/dev/null 2>&1; then
            echo 'APPLE_CERTIFICATE_PASSWORD 不正确，或 APPLE_CERTIFICATE 不是有效的 .p12 证书文件，将回退到 ad-hoc 签名' >&2
            exit 0
          fi

          if ! openssl pkcs12 -in "$cert_path" -info -noout -passin "pass:${APPLE_CERTIFICATE_PASSWORD}" >/dev/null 2>&1; then
            echo '无法读取 p12 证书内容，将回退到 ad-hoc 签名。请重新从钥匙串导出带私钥的 .p12 文件后再转 base64' >&2
            exit 0
          fi

          has_any_apple_id_auth=false
          has_complete_apple_id_auth=false
          has_any_api_key_auth=false
          has_complete_api_key_auth=false

          if [ -n "${APPLE_ID}" ] || [ -n "${APPLE_PASSWORD}" ] || [ -n "${APPLE_TEAM_ID}" ]; then
            has_any_apple_id_auth=true
          fi

          if [ -n "${APPLE_ID}" ] && [ -n "${APPLE_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
            has_complete_apple_id_auth=true
          fi

          if [ -n "${APPLE_API_KEY}" ] || [ -n "${APPLE_API_ISSUER}" ] || [ -n "${APPLE_API_KEY_PATH}" ]; then
            has_any_api_key_auth=true
          fi

          if [ -n "${APPLE_API_KEY}" ] && [ -n "${APPLE_API_ISSUER}" ] && [ -n "${APPLE_API_KEY_PATH}" ]; then
            has_complete_api_key_auth=true
          fi

          if [ "$has_any_apple_id_auth" = true ] && [ "$has_complete_apple_id_auth" != true ]; then
            echo 'Apple ID 公证参数不完整。请同时配置 APPLE_ID、APPLE_PASSWORD、APPLE_TEAM_ID，或者清空它们只做签名不做公证。' >&2
            exit 1
          fi

          if [ "$has_any_api_key_auth" = true ] && [ "$has_complete_api_key_auth" != true ]; then
            echo 'App Store Connect API 公证参数不完整。请同时配置 APPLE_API_KEY、APPLE_API_ISSUER、APPLE_API_KEY_PATH，或者清空它们只做签名不做公证。' >&2
            exit 1
          fi

          echo 'use_certificate=true' >> "$GITHUB_OUTPUT"
          echo 'Apple 证书 secret 预检查通过'

      - name: Prepare notarization environment
        if: startsWith(matrix.name, 'macos')
        id: notarization_env
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          set -euo pipefail

          if [ -n "${APPLE_ID}" ] && [ -n "${APPLE_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
            echo "apple_id=${APPLE_ID}" >> "$GITHUB_OUTPUT"
            echo "apple_password=${APPLE_PASSWORD}" >> "$GITHUB_OUTPUT"
            echo "apple_team_id=${APPLE_TEAM_ID}" >> "$GITHUB_OUTPUT"
            echo '使用 Apple ID 方式进行 notarization'
            exit 0
          fi

          if [ -n "${APPLE_API_KEY}" ] && [ -n "${APPLE_API_ISSUER}" ] && [ -n "${APPLE_API_KEY_PATH}" ]; then
            echo "apple_api_key=${APPLE_API_KEY}" >> "$GITHUB_OUTPUT"
            echo "apple_api_issuer=${APPLE_API_ISSUER}" >> "$GITHUB_OUTPUT"
            echo "apple_api_key_path=${APPLE_API_KEY_PATH}" >> "$GITHUB_OUTPUT"
            echo '使用 App Store Connect API 方式进行 notarization'
            exit 0
          fi

          echo '未配置完整的 notarization 参数，将仅进行签名，不执行公证'

      - name: Import Apple signing certificate
        if: startsWith(matrix.name, 'macos') && steps.apple_certificate_check.outputs.use_certificate == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Resolve Apple signing identity
        if: startsWith(matrix.name, 'macos')
        id: signing_identity
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.apple_certificate_check.outputs.use_certificate }}" != 'true' ]; then
            echo 'identity=-' >> "$GITHUB_OUTPUT"
            echo '证书不可用，使用 ad-hoc 签名'
            exit 0
          fi

          identity=$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)

          if [ -z "$identity" ]; then
            echo '未在钥匙串中找到 Developer ID Application 签名身份，回退到 ad-hoc 签名' >&2
            echo 'identity=-' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "identity=$identity" >> "$GITHUB_OUTPUT"
          echo "使用签名身份: $identity"

      - name: Build installer
        env:
          APPLE_ID: ${{ steps.notarization_env.outputs.apple_id || '' }}
          APPLE_PASSWORD: ${{ steps.notarization_env.outputs.apple_password || '' }}
          APPLE_TEAM_ID: ${{ steps.notarization_env.outputs.apple_team_id || '' }}
          APPLE_API_KEY: ${{ steps.notarization_env.outputs.apple_api_key || '' }}
          APPLE_API_ISSUER: ${{ steps.notarization_env.outputs.apple_api_issuer || '' }}
          APPLE_API_KEY_PATH: ${{ steps.notarization_env.outputs.apple_api_key_path || '' }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.name, 'macos') && steps.signing_identity.outputs.identity || '' }}
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          unset APPLE_CERTIFICATE
          unset APPLE_CERTIFICATE_PASSWORD

          if [ "${{ steps.apple_certificate_check.outputs.use_certificate }}" = 'true' ]; then
            export APPLE_CERTIFICATE="${APPLE_CERTIFICATE_SECRET}"
            export APPLE_CERTIFICATE_PASSWORD="${APPLE_CERTIFICATE_PASSWORD_SECRET}"
          fi

          if [ -z "${APPLE_ID}" ]; then
            unset APPLE_ID
          fi

          if [ -z "${APPLE_PASSWORD}" ]; then
            unset APPLE_PASSWORD
          fi

          if [ -z "${APPLE_TEAM_ID}" ]; then
            unset APPLE_TEAM_ID
          fi

          if [ -z "${APPLE_API_KEY}" ]; then
            unset APPLE_API_KEY
          fi

          if [ -z "${APPLE_API_ISSUER}" ]; then
            unset APPLE_API_ISSUER
          fi

          if [ -z "${APPLE_API_KEY_PATH}" ]; then
            unset APPLE_API_KEY_PATH
          fi

          if [ -z "${APPLE_SIGNING_IDENTITY}" ]; then
            unset APPLE_SIGNING_IDENTITY
          fi

          make ${{ matrix.make_target }}

      - name: Remove Tauri updater signature files without Apple signing
        if: startsWith(matrix.name, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          sig_paths=("${{ matrix.bundle_dir }}/macos"/*.sig)
          if [ ${#sig_paths[@]} -gt 0 ]; then
            rm -f "${sig_paths[@]}"
          fi

      - name: Validate macOS bundles
        if: startsWith(matrix.name, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          app_paths=("${{ matrix.bundle_dir }}/macos"/*.app)
          dmg_paths=("${{ matrix.bundle_dir }}/dmg"/*.dmg)

          if [ ${#app_paths[@]} -eq 0 ] && [ ${#dmg_paths[@]} -eq 0 ]; then
            echo '未找到 macOS 构建产物' >&2
            exit 1
          fi

          if [ ${#app_paths[@]} -gt 0 ]; then
            for app in "${app_paths[@]}"; do
              echo "检查应用结构: $app"
              test -d "$app/Contents/MacOS"
              test -f "$app/Contents/Info.plist"
              echo "验证代码签名: $app"
              codesign --verify --deep --strict --verbose=2 "$app"
              codesign -dv --verbose=4 "$app"
            done
          fi

          if [ ${#dmg_paths[@]} -gt 0 ]; then
            for dmg in "${dmg_paths[@]}"; do
              echo "校验磁盘镜像: $dmg"
              hdiutil verify "$dmg"
            done
          fi

      - name: Verify notarization when Apple credentials are configured
        if: startsWith(matrix.name, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          has_apple_id_auth=false
          has_api_key_auth=false

          if [ -n "${APPLE_CERTIFICATE}" ] && [ -n "${APPLE_ID}" ] && [ -n "${APPLE_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
            has_apple_id_auth=true
          fi

          if [ -n "${APPLE_CERTIFICATE}" ] && [ -n "${APPLE_API_KEY}" ] && [ -n "${APPLE_API_ISSUER}" ]; then
            has_api_key_auth=true
          fi

          if [ "$has_apple_id_auth" != true ] && [ "$has_api_key_auth" != true ]; then
            echo '未配置 Apple 公证凭据，跳过 notarization 校验'
            exit 0
          fi

          app_paths=("${{ matrix.bundle_dir }}/macos"/*.app)
          if [ ${#app_paths[@]} -eq 0 ]; then
            echo '未找到 macOS app 产物，无法校验 notarization' >&2
            exit 1
          fi

          for app in "${app_paths[@]}"; do
            echo "检查 Gatekeeper 评估: $app"
            spctl -a -vv "$app"
          done

      - name: Collect build artifacts
        id: collect_artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=()
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            matches=( $pattern )
            if [ ${#matches[@]} -gt 0 ]; then
              files+=("${matches[@]}")
            fi
          done <<'EOF'
          ${{ matrix.release_glob }}
          EOF

          if [ ${#files[@]} -eq 0 ]; then
            echo "未找到可上传的安装包: ${{ matrix.name }}" >&2
            exit 1
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sales-audio-ai-${{ matrix.name }}
          path: ${{ steps.collect_artifacts.outputs.files }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Collect release files
        id: collect_files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.app.tar.gz' \))

          if [ "${#files[@]}" -eq 0 ]; then
            echo '未找到可发布的构建产物' >&2
            exit 1
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.collect_files.outputs.files }}
          generate_release_notes: true
